<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Games - The Carey Network</title>

<link rel="stylesheet" href="/css/style.css" />

<link rel="apple-touch-icon" href="/images/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="/images/icon.png">
</head>

<body class="games-page">

<header class="site-header">
  <img src="/images/logo.png" class="logo" />
</header>

<main>
  <section class="hero orange-bg">

    <div class="game-player">

      <div class="game-frame">
        <iframe id="gameFrame" src="/assets/2048.html"></iframe>
      </div>

      <div class="game-controls">

        <!-- REFRESH -->
        <button onclick="refreshGame()">
          <img src="/images/refresh.png">
        </button>

        <!-- FULLSCREEN -->
        <button onclick="toggleFullscreen()">
          <img src="/images/fullscreen.png">
        </button>

        <!-- DELETE SAVE -->
        <button onclick="openDeletePopup()">
          <img src="/images/delete.png">
        </button>

      </div>

    </div>

  </section>
</main>

<div id="nav-container"></div>

<footer class="site-footer">
  <p>&copy; 2026 The Carey Network</p>
</footer>

<button id="exitFullscreenBtn" onclick="exitFullscreenMode()">✕</button>

<!-- CONFIRM POPUP -->
<div id="deletePopup" class="popup hidden">
  <div class="popup-box">
    <p>Delete saved game data?</p>
    <div class="popup-buttons">
      <button onclick="confirmDelete()">Yes</button>
      <button onclick="closeDeletePopup()">No</button>
    </div>
  </div>
</div>

<script src="/js/main.js"></script>

<script>
const frame = document.getElementById("gameFrame");

/* =========================
   BASIC CONTROLS
========================= */

function refreshGame() {
  frame.src = frame.src;
}

/* =========================
   FULLSCREEN
========================= */

function isWebApp() {
  return window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
}

function toggleFullscreen() {
  if (isWebApp()) {
    document.body.classList.toggle("embed-fullscreen");
  } else {
    if (!document.fullscreenElement) {
      frame.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
}

function exitFullscreenMode() {
  document.body.classList.remove("embed-fullscreen");
}

/* =========================
   DELETE SAVE SYSTEM
========================= */

function openDeletePopup() {
  document.getElementById("deletePopup").classList.remove("hidden");
}

function closeDeletePopup() {
  document.getElementById("deletePopup").classList.add("hidden");
}

function confirmDelete() {
  closeDeletePopup();

  // wipe common game storage
  try {
    localStorage.clear();
    sessionStorage.clear();
  } catch (e) {}

  // reload game
  frame.src = frame.src;

  alert("Game save deleted");
}
</script>

</body>
</html>
