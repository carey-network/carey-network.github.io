<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Games - The Carey Network</title>
<link rel="stylesheet" href="/css/style.css" />
<link rel="apple-touch-icon" href="/images/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="/images/icon.png">
</head>
<body class="games-page">

<header class="site-header">
  <img src="/images/logo.png" class="logo" alt="The Carey Network Logo" />
</header>

<main>
  <section class="hero orange-bg">
    <div class="game-player">
      <div class="game-frame">
        <iframe id="gameFrame" src="/assets/2048.html" data-src="/assets/2048.html"></iframe>
      </div>
      <div class="game-controls">
        <button onclick="refreshGame()">
          <img src="/images/refresh.png" alt="Refresh">
        </button>
        <button onclick="toggleFullscreen()">
          <img src="/images/fullscreen.png" alt="Fullscreen">
        </button>
        <button onclick="openDeletePopup()">
          <img src="/images/delete.png" alt="Delete Save">
        </button>
      </div>
    </div>
  </section>
</main>

<div id="nav-container"></div>

<footer class="site-footer">
  <p>&copy; 2026 The Carey Network — All rights reserved.</p>
</footer>

<button id="exitFullscreenBtn" onclick="exitFullscreenMode()">✕</button>

<div id="deletePopup" class="popup-overlay">
  <div class="popup-content">
    <p>Are you sure you want to delete your saved game data?</p>
    <button onclick="confirmDelete()">Delete Save</button>
    <button onclick="closeDeletePopup()" style="margin-top:10px; background:#333;">Cancel</button>
  </div>
</div>

<script src="/js/main.js"></script>
<script>
  const frame = document.getElementById("gameFrame");
  const player = document.querySelector(".game-player");
  const exitBtn = document.getElementById("exitFullscreenBtn");

  function refreshGame() {
    frame.src = frame.src;
  }

  function isWebApp() {
    return window.matchMedia("(display-mode: standalone)").matches
        || window.navigator.standalone === true;
  }

  // ---- FULLSCREEN ----
  function toggleFullscreen() {
    if (isWebApp()) {
      document.body.classList.toggle("embed-fullscreen");
      exitBtn.style.display = document.body.classList.contains("embed-fullscreen") ? "block" : "none";
    } else {
      if (!document.fullscreenElement) {
        player.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
    document.activeElement.blur();
  }

  function exitFullscreenMode() {
    if (isWebApp()) {
      document.body.classList.remove("embed-fullscreen");
      exitBtn.style.display = "none";
    } else {
      document.exitFullscreen();
    }
  }

  // Sync browser fullscreen state with class
  document.addEventListener("fullscreenchange", () => {
    if (document.fullscreenElement) {
      player.classList.add("player-fullscreen");
      exitBtn.style.display = "none"; // browser handles its own exit UI
    } else {
      player.classList.remove("player-fullscreen");
      exitBtn.style.display = "none";
    }
  });

  // ---- POPUP ----
  function openDeletePopup() {
    document.getElementById("deletePopup").classList.add("show");
  }

  function closeDeletePopup() {
    document.getElementById("deletePopup").classList.remove("show");
  }

  // ---- DELETE SAVE ----
  function confirmDelete() {
    closeDeletePopup();
    frame.src = "about:blank";
    setTimeout(() => {
      try {
        localStorage.clear();
        sessionStorage.clear();
      } catch(e) {}
      frame.src = frame.getAttribute("data-src");
    }, 100);
  }
</script>

</body>
</html>
