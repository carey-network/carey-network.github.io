<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Games - The Carey Network</title>
  <link rel="icon" type="image/png" href="../images/icon.png" />
  <link rel="apple-touch-icon" href="../images/icon.png" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<!-- No header text or hero on subpages per request -->

<!-- Orange background block still present -->
<main>
  <section class="hero orange-bg"></section>
</main>

<!-- Nav container for injected utility bar -->
<div id="nav-container"></div>

<footer class="site-footer">
  <p>&copy; 2026 The Carey Network — All rights reserved.</p>
</footer>

<script>
async function loadNav() {
  const res = await fetch("/components/nav.html");
  const data = await res.text();
  document.getElementById("nav-container").innerHTML = data;

  const icons = document.querySelectorAll(".utility-icon");
  const page = window.location.pathname.split("/").pop();

  icons.forEach(icon => {
    if (icon.href.includes(page)) icon.classList.add("active");
  });
}

document.addEventListener("DOMContentLoaded", () => {
  setTimeout(() => {
    document.body.classList.add("fade-in");
  }, 50);

  loadNav();

  document.querySelectorAll("a").forEach(link => {
    if (link.hostname === window.location.hostname) {
      link.addEventListener("click", function (e) {
        if (this.href !== window.location.href && this.getAttribute("href") !== "#") {
          e.preventDefault();
          const target = this.href;

          document.body.classList.remove("fade-in");
          document.body.classList.add("fade-out");

          // Instant transition
          requestAnimationFrame(() => {
            window.location.href = target;
          });
        }
      });
    }
  });
});
</script>

</body>
</html>
