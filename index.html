<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Carey Network</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
<img src="images/logo.png" class="logo">
</header>

<main>
<section class="hero">
<h1>Welcome to The Carey Network</h1>
<p>Connecting you to apps, tools, games, and more.</p>
<a href="apps/index.html" class="btn-primary">Explore</a>
</section>
</main>

<!-- NAV LOAD -->
<div id="nav-container"></div>

<footer class="site-footer">
<p>&copy; 2026 The Carey Network</p>
</footer>

<script>
async function loadNav() {
  const res = await fetch("/components/nav.html");
  const data = await res.text();
  document.getElementById("nav-container").innerHTML = data;

  const utilityIcons = document.querySelectorAll('.utility-icon');
  const currentPage = window.location.pathname.split("/").pop();

  utilityIcons.forEach(icon => {
    const linkPage = icon.getAttribute("href").split("/").pop();
    if (linkPage === currentPage || (currentPage === "" && linkPage === "index.html")) {
      icon.classList.add("active");
    }
  });
}

document.addEventListener("DOMContentLoaded", function () {
  document.body.classList.add("fade-in");
  loadNav();

  document.querySelectorAll("a").forEach(link => {
    if (link.hostname === window.location.hostname) {
      link.addEventListener("click", function (e) {
        if (this.href !== window.location.href) {
          e.preventDefault();
          const target = this.href;

          document.body.classList.add("fade-out");

          setTimeout(() => {
            window.location.href = target;
          }, 300);
        }
      });
    }
  });
});
</script>

</body>
</html>
