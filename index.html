<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Carey Network</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
<img src="images/logo.png" class="logo">
</header>

<main>
<section class="hero">
<h1>Welcome to The Carey Network</h1>
<p>Connecting you to apps, tools, games, and more.</p>
<a href="apps/index.html" class="btn-primary">Explore</a>
</section>
</main>

<nav class="utility-bar">
<a href="index.html" class="utility-icon active"><img src="images/icon.png"></a>
<a href="games/index.html" class="utility-icon"><img src="images/games.png"></a>
<a href="apps/index.html" class="utility-icon"><img src="images/apps.png"></a>
<a href="settings/index.html" class="utility-icon"><img src="images/settings.png"></a>
<a href="tools/index.html" class="utility-icon"><img src="images/tools.png"></a>
</nav>

<footer class="site-footer">
<p>&copy; 2026 The Carey Network</p>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {
  document.body.classList.add("fade-in");

  const links = document.querySelectorAll("a");

  links.forEach(link => {
    if (link.hostname === window.location.hostname && link.href) {
      link.addEventListener("click", function (e) {
        if (this.href !== window.location.href) {
          e.preventDefault();
          const target = this.href;

          document.body.classList.remove("fade-in");
          document.body.classList.add("fade-out");

          setTimeout(() => {
            window.location.href = target;
          }, 400);
        }
      });
    }
  });
});
</script>

</body>
</html>
