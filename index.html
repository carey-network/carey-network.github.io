<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Carey Network</title>

  <link rel="icon" type="image/png" href="/images/icon.png">
  <link rel="apple-touch-icon" href="/images/icon.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="logo-container">
    <img src="/images/logo.png" alt="The Carey Network Logo" class="logo">
  </div>
</header>

<main>
  <section class="hero">
    <h1>Welcome to The Carey Network</h1>
    <p>Connecting you to apps, tools, games, and more — all in one place.</p>
    <a href="/games" class="btn-primary">Explore</a>
  </section>

  <section class="about-section">
    <div class="content">
      <h2>About The Carey Network</h2>
      <p>The Carey Network brings together everything you need — apps, games, and tools — in a single seamless experience.</p>
    </div>
  </section>
</main>

<nav class="utility-bar">
  <a href="/" class="utility-icon active">
    <img src="/images/icon.png" alt="Home">
  </a>
  <a href="/games" class="utility-icon">
    <img src="/images/games.png" alt="Games">
  </a>
  <a href="/apps" class="utility-icon">
    <img src="/images/apps.png" alt="Apps">
  </a>
  <a href="/settings" class="utility-icon">
    <img src="/images/settings.png" alt="Settings">
  </a>
  <a href="/tools" class="utility-icon">
    <img src="/images/tools.png" alt="Tools">
  </a>
</nav>

<footer class="site-footer">
  <p>&copy; 2026 The Carey Network — All rights reserved.</p>
</footer>

<script>
  window.addEventListener("load", () => {
    document.body.classList.add("page-loaded");
  });

  document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {
      const href = this.getAttribute("href");
      if (href.startsWith("http") || href.startsWith("#")) return;
      e.preventDefault();
      document.body.classList.remove("page-loaded");
      setTimeout(() => {
        window.location.href = href;
      }, 300);
    });
  });
</script>

</body>
</html>
