<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps - The Carey Network</title>

  <link rel="icon" type="image/png" href="../images/icon.png">
  <link rel="apple-touch-icon" href="../images/icon.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="logo-container">
      <img src="../images/logo.png" alt="The Carey Network Logo" class="logo">
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Apps</h1>
      <p>Access your favorite apps here.</p>
      <a href="../index.html" class="btn-primary">Home</a>
    </section>
  </main>

  <nav class="utility-bar">
    <a href="../index.html" class="utility-icon"><img src="../images/icon.png" alt="Home"></a>
    <a href="../games/index.html" class="utility-icon"><img src="../images/games.png" alt="Games"></a>
    <a href="index.html" class="utility-icon active"><img src="../images/apps.png" alt="Apps"></a>
    <a href="../settings/index.html" class="utility-icon"><img src="../images/settings.png" alt="Settings"></a>
    <a href="../tools/index.html" class="utility-icon"><img src="../images/tools.png" alt="Tools"></a>
  </nav>

  <footer class="site-footer">
    <p>&copy; 2026 The Carey Network — All rights reserved.</p>
  </footer>

  <script>
    const utilityIcons = document.querySelectorAll('.utility-bar .utility-icon');
    const currentPage = window.location.pathname.split("/").pop();

    utilityIcons.forEach(icon => {
      const linkPage = icon.getAttribute("href").split("/").pop();
      icon.classList.remove("active");
      if(linkPage === currentPage || (currentPage === "" && linkPage === "index.html")){
        icon.classList.add("active");
      }

      icon.addEventListener('click', () => {
        utilityIcons.forEach(i => i.classList.remove('active'));
        icon.classList.add('active');
      });
    });
  </script>

</body>
</html>
