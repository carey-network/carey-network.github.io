<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Settings - The Carey Network</title>

<link rel="apple-touch-icon" href="/images/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carey Network">

<link rel="icon" href="/images/icon.png">
<link rel="manifest" href="/manifest.json">

<link rel="stylesheet" href="../css/style.css" />
<style>
/* ---- Modern Settings Menu (2x2 GRID) ---- */
.settings-menu {
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 40px;
  max-width: 700px;
  width: 90%;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  box-shadow: 0 0 20px rgba(230,92,0,0.3);
}

/* ---- Bigger Cards ---- */
.setting-card {
  background: rgba(17,17,17,0.75);
  border-radius: 18px;
  padding: 30px;
  text-align: center;
  color: #fff;
  cursor: pointer;
  min-height: 150px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
}

.setting-card h3 {
  margin-bottom: 15px;
  font-size: 1.2rem;
}

.setting-card p {
  font-size: 0.9rem;
  color: #ccc;
  margin-bottom: 10px;
}

/* ---- Hover ---- */
.setting-card:hover {
  transform: translateY(-4px);
  background: rgba(230,92,0,0.15);
  box-shadow: 0 0 12px #e65c00, 0 0 25px rgba(230,92,0,0.5);
}

/* ---- Cloak Button Styling ---- */
.setting-card button {
  padding:12px 28px;
  border:none;
  border-radius:14px;
  background:#e65c00;
  color:#fff;
  font-weight:600;
  font-size:1rem;
  cursor:pointer;
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
}

.setting-card button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #fff, 0 0 30px #e65c00;
  background:#ff7f2a;
}

/* ---- Toggle Styles ---- */
.toggle-switch {
  position: relative;
  width: 50px;
  height: 26px;
  display: inline-block;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top:0; left:0;
  right:0; bottom:0;
  background-color: #444;
  border-radius: 34px;
  transition: 0.25s;
}

slider:before {
  position: absolute;
  content: "";
  height: 20px;
  width: 20px;
  left: 3px;
  bottom: 3px;
  background-color: #fff;
  border-radius: 50%;
  transition: 0.25s;
}

input:checked + .slider {
  background-color: #e65c00;
}

input:checked + .slider:before {
  transform: translateX(24px);
}

/* ---- Mobile Fix ---- */
@media (max-width: 600px) {
  .settings-menu {
    grid-template-columns: 1fr;
  }
}

/* ---- Settings Popup ---- */
.popup-overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10000;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.popup-overlay.show {
  display: flex;
  opacity: 1;
}

.popup-content {
  background: rgba(17,17,17,0.95);
  border-radius: 20px;
  width: 320px;
  max-width: 90%;
  height: 320px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align: center;
  color: #fff;
  box-shadow: 0 0 25px #e65c00, 0 0 50px rgba(230,92,0,0.6);
  font-family: "Inter", sans-serif;
  animation: popupScale 0.25s ease-out;
  padding: 20px;
}

.popup-content p {
  font-size: 1.2rem;
  margin-bottom: 25px;
}

.popup-content button {
  padding: 12px 24px;
  border:none;
  border-radius:12px;
  background:#e65c00;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition: 0.25s ease;
}

.popup-content button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #fff, 0 0 40px #e65c00;
}

@keyframes popupScale {
  0% { transform: scale(0.8); opacity:0; }
  100% { transform: scale(1); opacity:1; }
}
</style>
</head>
<body>

<header class="site-header">
  <img src="../images/logo.png" class="logo" alt="The Carey Network Logo" />
</header>

<main>
  <section class="hero orange-bg">
    <div class="settings-menu">

      <div class="setting-card">
        <h3>Cloak</h3>
        <button>Activate</button>
      </div>

      <div class="setting-card">
        <h3>Auto Cloak</h3>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-card">
        <h3>Panic Button</h3>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-card">
        <h3>Web-App Mode</h3>
        <label class="toggle-switch">
          <input type="checkbox" disabled>
          <span class="slider"></span>
        </label>
      </div>

    </div>
  </section>
</main>

<div id="nav-container"></div>

<!-- Settings Popup -->
<div id="settings-popup" class="popup-overlay">
  <div class="popup-content">
    <p id="popup-message">This Setting Cannot Be Activated Due To Web-App Mode</p>
    <button id="popup-close">OK</button>
  </div>
</div>

<footer class="site-footer">
  <p>&copy; 2026 The Carey Network — All rights reserved.</p>
</footer>

<script src="/js/main.js"></script>
</body>
</html>
