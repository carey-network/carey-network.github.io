<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Settings - The Carey Network</title>

<link rel="stylesheet" href="../css/style.css" />

<!-- ONLY WHAT YOU ASKED FOR -->
<link rel="apple-touch-icon" href="/images/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carey Network">
<link rel="icon" href="/images/icon.png">
<link rel="manifest" href="/manifest.json">

<style>
/* ---- Modern Settings Menu (2x2 GRID) ---- */
.settings-menu {
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 40px;
  max-width: 700px;
  width: 90%;
  margin: 0 auto;

  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;

  box-shadow: 0 0 20px rgba(230,92,0,0.3);
}

/* ---- Bigger Cards ---- */
.setting-card {
  background: rgba(17,17,17,0.75);
  border-radius: 18px;
  padding: 30px;
  text-align: center;
  color: #fff;
  cursor: pointer;

  min-height: 150px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
}

.setting-card h3 {
  margin-bottom: 15px;
  font-size: 1.2rem;
}

.setting-card p {
  font-size: 0.9rem;
  color: #ccc;
  margin-bottom: 10px;
}

/* ---- Hover ---- */
.setting-card:hover {
  transform: translateY(-4px);
  background: rgba(230,92,0,0.15);
  box-shadow: 0 0 12px #e65c00, 0 0 25px rgba(230,92,0,0.5);
}

/* ---- Toggle Styles ---- */
.toggle-switch {
  position: relative;
  width: 50px;
  height: 26px;
  display: inline-block;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top:0; left:0;
  right:0; bottom:0;
  background-color: #444;
  border-radius: 34px;
  transition: 0.25s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 20px;
  width: 20px;
  left: 3px;
  bottom: 3px;
  background-color: #fff;
  border-radius: 50%;
  transition: 0.25s;
}

input:checked + .slider {
  background-color: #e65c00;
}

input:checked + .slider:before {
  transform: translateX(24px);
}

/* ---- Mobile Fix ---- */
@media (max-width: 600px) {
  .settings-menu {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <img src="../images/logo.png" class="logo" alt="The Carey Network Logo" />
</header>

<main>
  <section class="hero orange-bg">

    <div class="settings-menu">

      <div class="setting-card">
        <h3>Cloak</h3>
        <button style="
          padding:10px 20px;
          border:none;
          border-radius:12px;
          background:#e65c00;
          color:#fff;
          font-weight:600;
          cursor:pointer;
          transition: background 0.25s, transform 0.2s;
        " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
          Activate
        </button>
      </div>

      <div class="setting-card">
        <h3>Auto Cloak</h3>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-card">
        <h3>Panic Button</h3>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-card">
        <h3>Web-App Mode</h3>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

    </div>

  </section>
</main>

<!-- Utility Bar -->
<div id="nav-container"></div>

<footer class="site-footer">
  <p>&copy; 2026 The Carey Network — All rights reserved.</p>
</footer>

<script src="/js/main.js"></script>

</body>
</html>
