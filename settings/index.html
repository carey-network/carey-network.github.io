<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Settings - The Carey Network</title>

<link rel="apple-touch-icon" href="/images/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carey Network">

<link rel="icon" href="/images/icon.png">
<link rel="manifest" href="/manifest.json">

<link rel="stylesheet" href="../css/style.css" />

<style>
/* ---- Settings Menu ---- */
.settings-menu {
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 40px;
  max-width: 700px;
  width: 90%;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  box-shadow: 0 0 20px rgba(230,92,0,0.3);
}

.setting-card {
  background: rgba(17,17,17,0.75);
  border-radius: 18px;
  padding: 30px;
  text-align: center;
  color: #fff;
  cursor: pointer;
  min-height: 150px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
}

.setting-card h3 {
  margin-bottom: 15px;
  font-size: 1.4rem;
}

.setting-card p {
  font-size: 1rem;
  color: #ccc;
  margin-bottom: 10px;
}

.setting-card:hover {
  transform: translateY(-4px);
  background: rgba(230,92,0,0.15);
  box-shadow: 0 0 12px #e65c00, 0 0 25px rgba(230,92,0,0.5);
}

/* Cloak Button */
.setting-card button {
  padding: 16px 32px;
  border:none;
  border-radius:14px;
  background:#e68a2a; /* softer orange glow */
  color:#fff;
  font-weight:700;
  font-size:1.2rem;
  cursor:pointer;
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  box-shadow: 0 0 12px #e68a2a, 0 0 25px rgba(230,138,42,0.5);
}

.setting-card button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #fff, 0 0 40px #e68a2a;
}

/* ---- Modern Glow Toggle ---- */
.toggle-switch {
  position: relative;
  width: 70px;
  height: 36px;
  display: inline-block;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0;
  right: 0; bottom: 0;
  background: #333;
  border-radius: 34px;
  transition: background 0.3s ease, box-shadow 0.3s ease;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
}

.slider:before {
  position: absolute;
  content: "";
  height: 30px;
  width: 30px;
  left: 3px;
  bottom: 3px;
  background-color: #fff;
  border-radius: 50%;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

input:checked + .slider {
  background: #e65c00;
  box-shadow: 0 0 10px rgba(230,92,0,0.7), inset 0 2px 4px rgba(0,0,0,0.6);
}

input:checked + .slider:before {
  transform: translateX(34px);
  box-shadow: 0 0 8px rgba(255,255,255,0.6);
}

.toggle-switch:hover .slider {
  box-shadow: 0 0 12px rgba(230,92,0,0.6), inset 0 2px 4px rgba(0,0,0,0.6);
}

.toggle-switch:hover .slider:before {
  box-shadow: 0 0 12px rgba(255,255,255,0.7);
}

input:checked + .slider {
  animation: glowPulse 1.5s infinite alternate;
}

@keyframes glowPulse {
  0% { box-shadow: 0 0 8px rgba(230,92,0,0.7), inset 0 2px 4px rgba(0,0,0,0.6); }
  50% { box-shadow: 0 0 16px rgba(230,92,0,0.9), inset 0 2px 4px rgba(0,0,0,0.6); }
  100% { box-shadow: 0 0 8px rgba(230,92,0,0.7), inset 0 2px 4px rgba(0,0,0,0.6); }
}

/* ---- Popup Overlay ---- */
.popup-overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 10000;
}

.popup-overlay.show {
  opacity: 1;
  pointer-events: all;
}

.popup-content {
  background: rgba(17,17,17,0.95);
  border-radius: 18px;
  width: 380px;
  max-width: 90%;
  padding: 40px 30px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align: center;
  color: #fff;
  box-shadow: 0 0 30px #e65c00, 0 0 60px rgba(230,92,0,0.6);
  transform: translateY(-30px);
  opacity: 0;
  transition: transform 0.35s ease, opacity 0.35s ease;
}

.popup-overlay.show .popup-content {
  transform: translateY(0);
  opacity: 1;
}

.popup-content p {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 30px;
  line-height: 1.3;
}

.popup-content button {
  padding: 18px 40px;
  border:none;
  border-radius:16px;
  background:#e65c00;
  color:#fff;
  font-weight:700;
  font-size:1.4rem;
  cursor:pointer;
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
}

.popup-content button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #fff, 0 0 50px rgba(230,92,0,0.7);
}
</style>
</head>
<body>

<header class="site-header">
  <img src="../images/logo.png" class="logo" alt="The Carey Network Logo" />
</header>

<main>
  <section class="hero orange-bg">
    <div class="settings-menu">
      <div class="setting-card">
        <h3>Cloak</h3>
        <button>Activate</button>
      </div>

      <div class="setting-card">
        <h3>Auto Cloak</h3>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-card">
        <h3>Panic Button</h3>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-card">
        <h3>Web-App Mode</h3>
        <label class="toggle-switch">
          <input type="checkbox" disabled>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </section>
</main>

<div id="nav-container"></div>

<!-- Popup -->
<div id="settings-popup" class="popup-overlay">
  <div class="popup-content">
    <p id="popup-message">This Setting Cannot Be Activated Due To Web-App Mode</p>
    <button id="popup-close">OK</button>
  </div>
</div>

<footer class="site-footer">
  <p>&copy; 2026 The Carey Network — All rights reserved.</p>
</footer>

<script src="/js/main.js"></script>
</body>
</html>
