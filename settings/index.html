<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Settings - The Carey Network</title>
<link rel="stylesheet" href="../css/style.css" />
<style>
/* ---- Modern Settings Menu ---- */
.settings-menu {
  background: rgba(0,0,0,0.5);      /* translucent dark */
  backdrop-filter: blur(12px);       /* subtle blur */
  border-radius: 20px;
  padding: 30px;
  max-width: 800px;
  width: 90%;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
  box-shadow: 0 0 20px rgba(230,92,0,0.3);
}

.setting-card {
  background: rgba(17,17,17,0.7);
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  color: #fff;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
}

.setting-card h3 {
  margin-bottom: 10px;
  font-size: 1.1rem;
}

.setting-card p {
  font-size: 0.9rem;
  color: #ccc;
}

.setting-card:hover {
  transform: translateY(-3px);
  background: rgba(230,92,0,0.15);
  box-shadow: 0 0 10px #e65c00, 0 0 20px rgba(230,92,0,0.5);
}
</style>
</head>
<body>

<header class="site-header">
  <img src="../images/logo.png" class="logo" alt="The Carey Network Logo" />
</header>

<main>
  <section class="hero orange-bg">
    <!-- Modern Settings Menu -->
    <div class="settings-menu">
      <div class="setting-card">
        <h3>Account</h3>
        <p>Manage your account info</p>
      </div>
      <div class="setting-card">
        <h3>Privacy</h3>
        <p>Control your privacy settings</p>
      </div>
      <div class="setting-card">
        <h3>Appearance</h3>
        <p>Customize the look and feel</p>
      </div>
      <div class="setting-card">
        <h3>Notifications</h3>
        <p>Set up alerts and reminders</p>
      </div>
    </div>
  </section>
</main>

<!-- Utility Bar -->
<div id="nav-container"></div>

<footer class="site-footer">
  <p>&copy; 2026 The Carey Network — All rights reserved.</p>
</footer>

<script>
async function loadNav() {
  const res = await fetch("/components/nav.html");
  const data = await res.text();
  document.getElementById("nav-container").innerHTML = data;

  const icons = document.querySelectorAll(".utility-icon");
  const currentPath = window.location.pathname;

  icons.forEach(icon => {
    const iconPath = new URL(icon.href).pathname;
    if (iconPath === currentPath) {
      icon.classList.add("active");
    }
  });

  setupTransitions();
}

function setupTransitions() {
  document.querySelectorAll("a").forEach(link => {
    if (link.hostname === window.location.hostname) {

      const target = link.href;
      const current = window.location.href;

      link.addEventListener("click", function (e) {
        if (target === current || this.getAttribute("href") === "#") return;

        e.preventDefault();
        document.body.classList.remove("fade-in");
        document.body.classList.add("fade-out");

        setTimeout(() => {
          window.location.href = target;
        }, 500);
      });
    }
  });
}

document.addEventListener("DOMContentLoaded", () => {
  document.body.classList.remove("fade-out");
  document.body.classList.add("fade-in");

  loadNav();
  setupTransitions();
});
</script>

</body>
</html>
